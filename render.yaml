# Render Blueprint Specification for ProjectFlow
# Learn more at https://render.com/docs/blueprints

services:
  # -------------------------------------------------------------
  # 1. Backend Web Service (Node.js/Express)
  # -------------------------------------------------------------
  - type: web
    name: projectflow-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Set your MongoDB Atlas connection string in the Render Dashboard
      - key: JWT_SECRET
        generateValue: true # Generates a random secure secret automatically
      - key: JWT_REFRESH_SECRET
        generateValue: true # Generates a random secure secret automatically
      - key: CLIENT_URL
        sync: false # Set to your frontend Vercel URL (e.g. https://projectflow-frontend.vercel.app)
      - key: PORT
        value: 5000
