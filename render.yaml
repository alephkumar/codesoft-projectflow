# Render Blueprint Specification for ProjectFlow
# Learn more at https://render.com/docs/blueprints

services:
  # -------------------------------------------------------------
  # 1. Backend Web Service (Node.js/Express)
  # -------------------------------------------------------------
  - type: web
    name: projectflow-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Set your MongoDB Atlas connection string in the Render Dashboard
      - key: JWT_SECRET
        generateValue: true # Generates a random secure secret automatically
      - key: JWT_REFRESH_SECRET
        generateValue: true # Generates a random secure secret automatically
      - key: CLIENT_URL
        sync: false # Set to your frontend static site URL (e.g. https://projectflow-frontend.onrender.com)
      - key: PORT
        value: 5000

  # -------------------------------------------------------------
  # 2. Frontend Static Site (React - SPA)
  # -------------------------------------------------------------
  - type: web
    name: projectflow-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false # Set to your backend API URL (e.g. https://projectflow-backend.onrender.com/api)
    routes:
      # Rewrite all non-file requests to index.html for React Router SPA navigation
      - type: rewrite
        source: /*
        destination: /index.html
